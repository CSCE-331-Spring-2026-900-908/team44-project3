channels = ["conda-forge"]
name = "team44-project3"
platforms = ["linux-64", "osx-arm64", "win-64"]
version = "0.1.0"
readme = "README.md"

[tasks]

[target.win-64.tasks]
install-bun = "powershell -Command \"irm bun.sh/install.ps1 | iex\""

[dependencies]
maven = ">=3.9.14,<4"
python = ">=3.14.3,<3.15"
polars = ">=1.39.3,<2"
faker = ">=40.11.1,<41"
