quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.mailer.host=${SMTP_HOST}
quarkus.mailer.port=587
quarkus.mailer.username=${SMTP_USER}
quarkus.mailer.password=${SMTP_PASS}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.from=${RECEIPT_FROM}
quarkus.mailer.tls=false
quarkus.mailer.mock=false
quarkus.datasource.jdbc.min-size=1
quarkus.quinoa.package-manager=bun
quarkus.quinoa.ui-dir=src/main/webui
quarkus.quinoa.build-dir=build
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.enable-spa-routing=true
%dev.quarkus.quinoa.dev-server.index-page=/
%dev.quarkus.devservices.enabled=false
